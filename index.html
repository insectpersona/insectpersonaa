<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insect Persona</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#c8dba0;overflow:hidden}
    #stage{position:relative;width:100vw;height:100vh}
    #img{
      position:absolute;top:0;left:0;
      width:100%;height:100%;
      object-fit:contain;
      object-position:center center;
      image-rendering:pixelated;
      user-select:none;-webkit-user-drag:none;
    }
    #hl{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
    .hs{
      position:absolute;background:transparent;border:none;
      cursor:pointer;pointer-events:all;
      /* debug: background:rgba(255,0,0,.3); */
    }
    .hs:hover{background:rgba(255,255,255,.08)}
    .hs:active{background:rgba(255,255,255,.18)}
  </style>
</head>
<body>
<div id="stage">
  <img id="img" src="start.jpeg" alt="" draggable="false"/>
  <div id="hl"></div>
</div>
<script>
// Positions mesurées précisément depuis tes screenshots (% de l'image rendue)
const BTN_START = {t:46.3, l:23.2, w:53.2, h:11.2};

const BTN_ANS = [
  {t:49.5, l:30.7, w:39.7, h:9.1},  // A
  {t:60.5, l:30.7, w:39.7, h:9.1},  // B
  {t:71.6, l:30.7, w:39.7, h:9.1},  // C
  {t:82.7, l:30.7, w:39.7, h:9.1},  // D
];

const BTN_AGAIN = {t:77.4, l:23.2, w:53.2, h:6.0};

const Q_IMGS = [
  'q1.jpeg','q2.jpeg','q3.jpeg','q4.jpeg','q5.jpeg',
  'q6.jpeg','q7.jpeg','q8.jpeg','q9.jpeg','q10.jpeg',
  'q11.jpeg','q12.jpeg','q13.jpeg','q14.jpeg','q15.jpeg'
];

const RESULT = {
  ESTJ:'ant.png',      ISFJ:'bee.png',
  ISTP:'beetle.png',   ESFJ:'bumblebee.png',
  ENFP:'butterfly.png',ENFJ:'cicada.png',
  ENTP:'cricket.png',  ENTJ:'dragonfly.png',
  ISFP:'firefly.png',  ESFP:'ladybug.png',
  INTJ:'mantis.png',   INFP:'moth.png',
  INTP:'spider.png',   ISTJ:'termite.png',
  ESTP:'wasp.png',     INFJ:'weevil.png',
};

const SC = [
  [{E:1},{I:1},{T:1},{N:1}],
  [{E:1},{S:1},{T:1},{F:1}],
  [{E:1,P:1},{S:1},{T:1},{N:1,F:1}],
  [{J:1},{P:1},{T:1},{F:1}],
  [{N:1},{S:1},{T:1},{N:1,F:1}],
  [{E:1},{I:1},{T:1},{F:1}],
  [{E:1},{I:1},{T:1},{N:1,P:1}],
  [{E:1},{I:1,S:1},{T:1},{N:1,P:1}],
  [{E:1,P:1},{S:1},{T:1},{N:1,F:1}],
  [{P:1},{S:1},{T:1},{N:1}],
  [{E:1,P:1},{S:1},{T:1},{N:1}],
  [{E:1,P:1},{S:1,I:1},{T:1},{N:1,F:1}],
  [{E:1,N:1},{S:1,I:1},{T:1},{N:1,F:1}],
  [{E:1,F:1},{I:1},{T:1},{F:1}],
  [{E:1,P:1},{I:1,N:1},{T:1,J:1},{F:1}],
];

let curQ=0, sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
const imgEl=document.getElementById('img');
const hl=document.getElementById('hl');
let spots=[];

function getRect(){
  const cW=imgEl.clientWidth, cH=imgEl.clientHeight;
  const nW=imgEl.naturalWidth||2000, nH=imgEl.naturalHeight||1413;
  const scale=Math.min(cW/nW, cH/nH);
  const rW=nW*scale, rH=nH*scale;
  return {x:(cW-rW)/2, y:(cH-rH)/2, w:rW, h:rH};
}

function place(el,p){
  const r=getRect();
  el.style.left  =(r.x+r.w*p.l/100)+'px';
  el.style.top   =(r.y+r.h*p.t/100)+'px';
  el.style.width =(r.w*p.w/100)+'px';
  el.style.height=(r.h*p.h/100)+'px';
}

function reflow(){spots.forEach(({el,p})=>place(el,p));}
window.addEventListener('resize',reflow);

function addSpot(p,fn){
  const el=document.createElement('button');
  el.className='hs'; el.onclick=fn;
  hl.appendChild(el); place(el,p);
  spots.push({el,p});
}

function clear(){hl.innerHTML='';spots=[];}

function load(src,cb){
  clear();
  imgEl.onload=()=>{reflow();cb();};
  imgEl.onerror=()=>console.warn('Missing:',src);
  imgEl.src=src;
}

function home(){
  curQ=0; sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  load('start.jpeg',()=>addSpot(BTN_START,quiz));
}

function quiz(){
  curQ=0;
  load(Q_IMGS[0],()=>BTN_ANS.forEach((p,i)=>addSpot(p,()=>pick(i))));
}

function pick(i){
  Object.entries(SC[curQ][i]).forEach(([k,v])=>sc[k]=(sc[k]||0)+v);
  if(curQ<14){
    curQ++;
    load(Q_IMGS[curQ],()=>BTN_ANS.forEach((p,j)=>addSpot(p,()=>pick(j))));
  } else showResult();
}

function showResult(){
  const s=sc;
  const mbti=(s.E>=s.I?'E':'I')+(s.S>=s.N?'S':'N')+(s.T>=s.F?'T':'F')+(s.J>=s.P?'J':'P');
  load(RESULT[mbti]||'butterfly.png',()=>addSpot(BTN_AGAIN,home));
}

home();
</script>
</body>
</html>
